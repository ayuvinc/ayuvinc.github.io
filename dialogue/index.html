document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

*, *::before, *::after { box-sizing: border-box; }\n  html, body { margin: 0; padding: 0; }\n  body {\n    background: var(--bg);\n    color: var(--text);\n    font-family: 'Inter', sans-serif;\n    font-weight: 400;\n    font-size: 17px;\n    line-height: 1.6;\n    -webkit-font-smoothing: antialiased;\n  }\n\n  a:focus-visible, button:focus-visible {\n    outline: 2px solid var(--teal);\n    outline-offset: 3px;\n  }\n\n  .caps {\n    font-size: 13px;\n    font-weight: 500;\n    text-transform: uppercase;\n    letter-spacing: 0.14em;\n    color: var(--muted);\n  }\n\n  /* ═══ Shell ═══ */\n  .page {\n    min-height: 100svh;\n    display: flex;\n    flex-direction: column;\n    padding: 0 64px;\n  }\n  header.topbar {\n    height: 56px;\n    flex: none;\n    display: flex;\n    align-items: center;\n    justify-content: space-between;\n  }\n  .logo { color: var(--text); }\n  main {\n    flex: 1;\n    min-height: 0;\n    display: flex;\n    flex-direction: column;\n    justify-content: center;\n    padding: 8px 0;\n  }\n  footer {\n    height: 48px;\n    flex: none;\n    border-top: 1px solid var(--hairline);\n    display: flex;\n    align-items: center;\n    justify-content: center;\n  }\n  footer p { margin: 0; font-size: 12px; color: var(--muted); }\n\n  /* ═══ Row 1 — headline ═══ */\n  .headline { max-width: 900px; }\n  .headline .caps { display: block; margin: 0 0 14px; }\n  h1 {\n    font-family: 'Fraunces', serif;\n    font-weight: 600;\n    font-size: clamp(36px, 5vw, 64px);\n    line-height: 1.08;\n    letter-spacing: -0.01em;\n    margin: 0 0 16px;\n  }\n  .rents { position: relative; display: inline-block; }\n  .rents::after {\n    content: \"\";\n    position: absolute;\n    left: 0;\n    bottom: 0.04em;\n    height: 3px;\n    width: 100%;\n    background: var(--teal);\n  }\n  .headline .body { font-size: 18px; max-width: 640px; margin: 0; }\n\n  /* ═══ Row 2 — frontier rail ═══ */\n  .rail-zone { margin: clamp(28px, 4.5vh, 44px) 0 0; }\n  .rail {\n    position: relative;\n    display: grid;\n    grid-template-columns: repeat(6, auto);\n    justify-content: space-between;\n  }\n  .rail .line {\n    position: absolute;\n    left: 30px;\n    right: 30px;\n    top: 38px; /* dot 4 + gap 6 + half of 56px icon */\n    height: 1px;\n    background: var(--hairline);\n  }\n  .rail .pulse {\n    position: absolute;\n    top: 26px;\n    left: -120px;\n    width: 120px;\n    height: 25px;\n    border-radius: 50%;\n    background: radial-gradient(closest-side, var(--teal-glow), transparent 72%);\n    opacity: 0;\n    pointer-events: none;\n  }\n  .sym {\n    position: relative;\n    z-index: 1;\n    display: flex;\n    flex-direction: column;\n    align-items: center;\n    gap: 6px;\n    background: var(--bg);\n    padding: 0 8px;\n  }\n  .sym .dot { width: 4px; height: 4px; border-radius: 50%; background: var(--teal); }\n  .sym.frontier .dot { background: transparent; }\n  .sym svg { width: 56px; height: 56px; display: block; color: var(--teal); }\n  .sym svg * {\n    fill: none;\n    stroke: currentColor;\n    stroke-width: 1.5;\n    stroke-linecap: round;\n    stroke-linejoin: round;\n  }\n  .sym.frontier svg { color: var(--dim); }\n  .sym .lbl {\n    font-size: 11px;\n    font-weight: 500;\n    text-transform: uppercase;\n    letter-spacing: 0.14em;\n    color: var(--muted);\n  }\n  .caption {\n    font-size: 15px;\n    font-style: italic;\n    color: var(--muted);\n    text-align: center;\n    margin: clamp(16px, 2.8vh, 26px) 0 0;\n  }\n  .caption strong { color: var(--text); font-weight: 600; }\n\n  /* ═══ Row 3 — filter + CTA ═══ */\n  .row3 {\n    display: grid;\n    grid-template-columns: 55% 45%;\n    align-items: center;\n    margin-top: clamp(28px, 4.5vh, 44px);\n  }\n  .roles {\n    font-family: 'Fraunces', serif;\n    font-weight: 600;\n    font-size: 20px;\n    line-height: 1.3;\n    margin: 0 0 12px;\n  }\n  .filter p { margin: 0 0 10px; font-size: 17px; }\n  .filter p:last-child { margin-bottom: 0; }\n  .cta-zone {\n    display: flex;\n    flex-direction: column;\n    align-items: flex-end;\n    justify-content: center;\n    gap: 14px;\n    padding-left: 32px;\n  }\n  .cta {\n    display: inline-block;\n    background: var(--teal);\n    color: #0F0E0D;\n    font-family: 'Inter', sans-serif;\n    font-weight: 600;\n    font-size: 18px;\n    line-height: 1;\n    padding: 22px 44px;\n    border-radius: 8px;\n    text-decoration: none;\n    box-shadow: 0 0 32px var(--teal-glow);\n    transition: background 180ms var(--ease), transform 180ms var(--ease), box-shadow 180ms var(--ease);\n  }\n  .cta:hover {\n    background: var(--teal-bright);\n    transform: translateY(-2px);\n    box-shadow: 0 0 64px var(--teal-glow);\n  }\n  .cta:active { transform: translateY(0); }\n  .cta-sub { text-align: right; margin: 0; }\n\n  /* ═══ Mobile bottom bar ═══ */\n  .bottombar { display: none; }\n\n  /* ═══ Stacked ≤1023px ═══ */\n  @media (max-width: 1023px) {\n    .page { padding: 0 32px; }\n    main { padding: 24px 0 40px; justify-content: flex-start; }\n    .row3 { grid-template-columns: 1fr; gap: 28px; }\n    .cta-zone { align-items: stretch; padding-left: 0; }\n    .cta { text-align: center; }\n    .cta-sub { text-align: center; }\n  }\n\n  /* ═══ Mobile ≤768px ═══ */\n  @media (max-width: 768px) {\n    .page { padding: 0 24px; }\n    body { padding-bottom: 56px; }\n    .headline .body { font-size: 17px; }\n    .sym svg { width: 40px; height: 40px; }\n    .sym .lbl { font-size: 9px; letter-spacing: 0.1em; }\n    .sym { padding: 0 4px; }\n    .rail .line { left: 22px; right: 22px; top: 30px; }\n    .rail .pulse { top: 18px; }\n    .bottombar {\n      display: block;\n      position: fixed;\n      left: 0;\n      right: 0;\n      bottom: 0;\n      height: 56px;\n      padding: 8px 16px;\n      background: rgba(15, 14, 13, 0.9);\n      -webkit-backdrop-filter: blur(12px);\n      backdrop-filter: blur(12px);\n      border-top: 1px solid var(--hairline);\n      z-index: 50;\n    }\n    .bottombar .cta {\n      display: block;\n      width: 100%;\n      text-align: center;\n      padding: 12px 0;\n      font-size: 16px;\n      box-shadow: 0 0 24px var(--teal-glow);\n    }\n  }\n\n  /* ═══ Rail snakes into 3×2 ≤520px ═══ */\n  @media (max-width: 520px) {\n    .rail {\n      grid-template-columns: repeat(3, 1fr);\n      row-gap: 28px;\n      justify-items: center;\n    }\n    .rail .pulse { display: none; }\n    .rail .line { display: none; }\n    .rail .snake { position: absolute; background: var(--hairline); display: block; }\n    .rail .snake-a { left: 16%; right: 6%; top: 30px; height: 1px; }\n    .rail .snake-v { right: 6%; top: 30px; height: 103px; width: 1px; }\n    .rail .snake-b { left: 16%; right: 6%; top: 133px; height: 1px; }\n  }\n  .rail .snake { display: none; }\n\n  @media (max-width: 480px) {\n    .topbar .cd { display: none; }\n  }\n\n  /* ═══ MOTION (reduced-motion: everything static & visible) ═══ */\n  @media (prefers-reduced-motion: no-preference) {\n    /* 1 — top bar */\n    html.js header.topbar { animation: fadeIn 200ms var(--ease) both; }\n    @keyframes fadeIn { from { opacity: 0; } }\n\n    /* 2 — headline lines */\n    html.js .hl {\n      animation: rise 450ms var(--ease) both;\n      animation-delay: calc(200ms + var(--i) * 120ms);\n    }\n    @keyframes rise { from { opacity: 0; transform: translateY(12px); } }\n\n    /* teal underline draws in 500ms after load */\n    html.js .rents::after { animation: draw 500ms var(--ease) 500ms both; }\n    @keyframes draw { from { width: 0; } }\n\n    /* 3 — rail symbols pop in left→right */\n    html.js .sym {\n      animation: pop 300ms var(--ease) both;\n      animation-delay: calc(650ms + var(--n) * 100ms);\n    }\n    @keyframes pop { from { opacity: 0; transform: scale(0.8); } }\n    html.js .rail .line {\n      animation: grow 700ms var(--ease) 650ms both;\n      transform-origin: left center;\n    }\n    @keyframes grow { from { transform: scaleX(0); } }\n\n    html.js .caption { animation: fadeIn 600ms var(--ease) 1250ms both; }\n    html.js .filter { animation: fadeIn 600ms var(--ease) 1400ms both; }\n    /* 5 — CTA last, glow already breathing */\n    html.js .cta-zone { animation: fadeIn 600ms var(--ease) 1550ms both; }\n\n    /* 4 — light pulse travels the rail every 4s, stalls at the frontier */\n    .rail .pulse { animation: travel 4s linear 1700ms infinite; }\n    @keyframes travel {\n      0%   { left: -120px; opacity: 0; }\n      4%   { opacity: 0.9; }\n      45%  { left: calc(76% - 60px); opacity: 0.9; } /* 1.8s travel */\n      58%  { left: calc(76% - 60px); opacity: 0.9; } /* stall */\n      67%  { left: calc(76% - 60px); opacity: 0; }\n      100% { left: calc(76% - 60px); opacity: 0; }\n    }\n    /* frontier symbols flicker toward teal but never light up (900ms) */\n    .sym.frontier svg { animation: flicker 4s var(--ease) 1700ms infinite; }\n    @keyframes flicker {\n      0%, 45%   { color: var(--dim); opacity: 1; }\n      49%       { color: var(--teal); opacity: 0.3; }\n      56%       { color: var(--teal); opacity: 0.6; }\n      63%       { color: var(--teal); opacity: 0.3; }\n      67.5%, 100% { color: var(--dim); opacity: 1; }\n    }\n\n    /* CTA breathing glow */\n    .cta { animation: breathe 3s ease-in-out infinite; }\n    @keyframes breathe {\n      0%, 100% { box-shadow: 0 0 24px var(--teal-glow); }\n      50%      { box-shadow: 0 0 52px var(--teal-glow); }\n    }\n    .cta:hover { animation: none; }\n  }\n\n  /* Print / static capture: everything visible */\n  @media print {\n    .hl, .headline, .sym, .caption, .filter, .cta-zone, header.topbar { opacity: 1 !important; animation: none !important; transform: none !important; }\n    .bottombar, .pulse { display: none !important; }\n  }\n<\u002Fstyle>\n<\u002Fhead>\n<body>\n\n\n\n<div class=\"page\">\n\n  <header class=\"topbar\">\n    <span class=\"caps logo\">AYUVINC<\u002Fspan>\n    <span class=\"caps cd\" data-countdown=\"\"><\u002Fspan>\n  <\u002Fheader>\n\n  <main>\n\n    <div class=\"headline\" data-screen-label=\"Headline\">\n      <span class=\"caps hl\" style=\"--i: 0;\">An invitation — 10 seats · July 4<\u002Fspan>\n      <h1 class=\"hl\" style=\"--i: 1;\">AI doesn't own anything. It <span class=\"rents\">rents<\u002Fspan>.<\u002Fh1>\n      <p class=\"body hl\" style=\"--i: 2;\">Whoever owns the data and the rails owns AI. In India, almost nobody is building that layer for medicine. We are.<\u002Fp>\n    <\u002Fdiv>\n\n    <div class=\"rail-zone\" data-screen-label=\"Frontier rail\">\n      <div class=\"rail\" role=\"img\" aria-label=\"Six fields on a line: silicon, code, chess, and math are lit — solved. Genetics and medicine are dark — the frontier.\">\n        <span class=\"line\" aria-hidden=\"true\"><\u002Fspan>\n        <span class=\"snake snake-a\" aria-hidden=\"true\"><\u002Fspan>\n        <span class=\"snake snake-v\" aria-hidden=\"true\"><\u002Fspan>\n        <span class=\"snake snake-b\" aria-hidden=\"true\"><\u002Fspan>\n        <span class=\"pulse\" aria-hidden=\"true\"><\u002Fspan>\n\n        <span class=\"sym\" style=\"--n: 0;\">\n          <span class=\"dot\"><\u002Fspan>\n          <svg viewBox=\"0 0 56 56\" aria-hidden=\"true\">\n            <rect x=\"16\" y=\"16\" width=\"24\" height=\"24\" rx=\"2\"><\u002Frect>\n            <rect x=\"24\" y=\"24\" width=\"8\" height=\"8\" rx=\"1\"><\u002Frect>\n            <path d=\"M22 16 V11 M28 16 V11 M34 16 V11\"><\u002Fpath>\n            <path d=\"M22 45 V40 M28 45 V40 M34 45 V40\"><\u002Fpath>\n            <path d=\"M11 22 H16 M11 28 H16 M11 34 H16\"><\u002Fpath>\n            <path d=\"M40 22 H45 M40 28 H45 M40 34 H45\"><\u002Fpath>\n          <\u002Fsvg>\n          <span class=\"lbl\">Silicon<\u002Fspan>\n        <\u002Fspan>\n\n        <span class=\"sym\" style=\"--n: 1;\">\n          <span class=\"dot\"><\u002Fspan>\n          <svg viewBox=\"0 0 56 56\" aria-hidden=\"true\">\n            <path d=\"M19 18 L10 28 L19 38\"><\u002Fpath>\n            <path <strong>Medicine<\u002Fstrong> is what's left — and it's the part that matters.<\u002Fp>\n    <\u002Fdiv>\n\n    <div class=\"row3\" data-screen-label=\"Filter and CTA\">\n      <div class=\"filter\">\n        <p class=\"roles\">Engineers. Scientists. Mathematicians. Doctors. Founders.<\u002Fp>\n        <p>One honest question: are you willing to take on hard, unsolved problems — or looking for one more old solution to copy-paste? We only want the first kind.<\u002Fp>\n        <p>Ten seats. A two-way working session — we share the unsolved problems, you bring your sharpest thinking.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"cta-zone\">\n        <a class=\"cta\" href=\"https://docs.google.com/forms/d/e/1FAIpQLSfHOug5MN7-H0nWwJHtuOZ4A0s1CZcUNq-I56HwDcB6XFh2zw/viewform?usp=header\" target=\"_blank\" rel=\"noopener\">Claim your seat →<\u002Fa>\n        <p class=\"caps cta-sub\">Google Meet · July 4, 7 p.m. IST · Closes June 30<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n  <\u002Fmain>\n\n  <footer>\n    <p>AyuVinc Healthcare Systems Private Limited · ayuvinc.com · Built in India, for India<\u002Fp>\n  <\u002Ffooter>\n\n<\u002Fdiv>\n\n<div class=\"bottombar\">\n  <a class=\"cta\" href=\"https://docs.google.com/forms/d/e/1FAIpQLSfHOug5MN7-H0nWwJHtuOZ4A0s1CZcUNq-I56HwDcB6XFh2zw/viewform?usp=header\" target=\"_blank\" rel=\"noopener\">Claim your seat →<\u002Fa>\n<\u002Fdiv>\n\n<script>\n(function () {\n  \"use strict\";\n  /* June 30, 2026, 23:59 IST = 18:29 UTC */\n  var TARGET = Date.UTC(2026, 5, 30, 18, 29, 0);\n  var els = document.querySelectorAll(\"[data-countdown]\");\n  function pad(n) { return (n < 10 ? \"0\" : \"\") + n; }\n  function tick() {\n    var now = Date.now(), i, text;\n    if (now >= TARGET) {\n      text = \"Applications closed\";\n    } else {\n      var diff = TARGET - now;\n      var d = Math.floor(diff / 86400000);\n      var h = Math.floor((diff % 86400000) / 3600000);\n      text = \"Applications close in \" + d + \"d \" + pad(h) + \"h\"
